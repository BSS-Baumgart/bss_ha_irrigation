name: "Irrigation BSS"
version: "1.0.0"
slug: "irrigation_bss"
description: "Advanced irrigation management — zones, valves, sensors, scheduler"
url: "https://github.com/BSS-Baumgart/bss_ha_irrigation"
arch:
  - aarch64
  - amd64
  - armv7
  - i386
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: "mdi:sprinkler"
panel_title: "Irrigation"
panel_admin: false

homeassistant_api: true
hassio_api: false
auth_api: false

map:
  - config:rw
  - share:rw

options:
  ha_url: "http://homeassistant:8123"
  ha_token: ""
  log_level: "info"
  language: "en"

schema:
  ha_url: str
  ha_token: str
  log_level: list(debug|info|warning|error)
  language: list(pl|en|de)

image: "ghcr.io/bss-baumgart/bss_ha_irrigation_{arch}"
